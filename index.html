    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <link rel="preconnect" href="[fonts.googleapis.com](https://fonts.googleapis.com)">

    <link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap)" rel="stylesheet">

    <style>
        :root {
            --bg-1: #0a0a0c;
            --bg-2: #050507;
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
            background: var(--bg-2);
        }

        body {
            position: relative;
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-2);
            color: #f5f5f5;
            font-family: 'Manrope', sans-serif;
            transition: color 1.2s ease;
        }

        /* ---------- Animated aurora mesh background ---------- */
        .mesh {
            position: absolute;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.55;
            mix-blend-mode: screen;
        }

        .blob.b1 {
            width: 55vw;
            height: 55vw;
            top: -10%;
            left: -10%;
            background: radial-gradient(circle, rgba(45, 90, 255, 0.5), transparent 70%);
            animation: drift1 22s ease-in-out infinite alternate;
        }

        .blob.b2 {
            width: 50vw;
            height: 50vw;
            bottom: -15%;
            right: -10%;
            background: radial-gradient(circle, rgba(120, 60, 255, 0.45), transparent 70%);
            animation: drift2 26s ease-in-out infinite alternate;
        }

        .blob.b3 {
            width: 45vw;
            height: 45vw;
            top: 30%;
            left: 40%;
            background: radial-gradient(circle, rgba(0, 180, 220, 0.35), transparent 70%);
            animation: drift3 30s ease-in-out infinite alternate;
        }

        @keyframes drift1 {
            from { transform: translate(0, 0) scale(1); }
            to   { transform: translate(8vw, 6vh) scale(1.15); }
        }

        @keyframes drift2 {
            from { transform: translate(0, 0) scale(1.05); }
            to   { transform: translate(-7vw, -5vh) scale(0.95); }
        }

        @keyframes drift3 {
            from { transform: translate(-50%, -50%) scale(1); }
            to   { transform: translate(-58%, -42%) scale(1.2); }
        }

        /* subtle film grain overlay */
        .grain {
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            opacity: 0.04;
            background-image: url("data:image/svg+xml,%3Csvg xmlns='[w3.org](http://www.w3.org/2000/svg)' width='120' height='120'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        }

        /* ---------- Light theme fade ---------- */
        .themeFade {
            position: absolute;
            inset: 0;
            z-index: 0;
            background: radial-gradient(circle at center, #eeeeee, #c9c9c9, #8d8d8d);
            opacity: 0;
            transition: opacity 1.2s ease;
            pointer-events: none;
        }

        .light .themeFade {
            opacity: 1;
        }

        .light .mesh {
            opacity: 0.35;
        }

        .themeButton {
            position: absolute;
            top: 25px
